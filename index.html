<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynami Instrumentpanel - Live</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        color: #333;
        display: flex;
        min-height: 100vh;
        background: linear-gradient(to bottom, #ffaf4b, #ff8c00);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .container {
        display: flex;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.9);
        margin: 20px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .left-panel {
        background-color: #ffffff;
        padding: 40px;
        width: 60%;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        max-height: 100%;
        box-sizing: border-box;
    }

    .right-panel {
        padding: 40px;
        width: 40%;
        display: flex;
        flex-direction: column;
        color: #333;
    }

    h1 {
        font-size: 48px;
        color: #e65100;
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
        flex-shrink: 0;
    }

    h2 {
        font-size: 28px;
        color: #e65100;
        margin-top: 30px;
        margin-bottom: 15px;
    }

    #service-list-container {
        flex-grow: 1;
        overflow-y: auto;
        min-height: 0;
        padding-right: 15px;
    }

    .checklist-item {
        margin-bottom: 10px;
        display: flex;
        align-items: center;
    }

    .checklist-item-wrapper {
        margin-bottom: 30px;
        border-bottom: 1px solid #eee;
        padding-bottom: 20px;
    }

    .checklist-item input[type="checkbox"] {
        display: none;
    }

    .checklist-item label {
        position: relative;
        padding-left: 45px;
        cursor: pointer;
        font-size: 20px;
        line-height: 1.4;
    }

    .checklist-item label:before {
        content: '';
        position: absolute;
        left: 0;
        top: 4px;
        width: 28px;
        height: 28px;
        border: 3px solid #ff8c00;
        border-radius: 5px;
        background-color: #fff;
    }

    .checklist-item input[type="checkbox"]:checked + label:after {
        content: '';
        position: absolute;
        left: 10px;
        top: 9px;
        width: 8px;
        height: 16px;
        border: solid #e65100;
        border-width: 0 4px 4px 0;
        transform: rotate(45deg);
    }

    .time-entry-container {
        margin-left: 45px;
        margin-top: 15px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
    }
    
    .time-input-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
    }

    .time-entry-container label {
        font-weight: bold;
        font-size: 16px;
        flex-shrink: 0;
        width: 70px; /* Lite bredare för att "Total tid" ska få plats */
    }
    
    /* Uppdaterad CSS för att hantera text-input istället för time-input */
    .time-entry-container input[type="text"] {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        width: 140px;
        transition: border-color 0.3s, box-shadow 0.3s; 
    }

    .saved-indicator {
        border-color: #28a745 !important;
        box-shadow: 0 0 5px rgba(40, 167, 69, 0.5);
    }

    .button-row {
        margin-top: 5px;
        display: flex;
        gap: 15px;
    }

    .pdf-button {
        padding: 9px 18px;
        font-size: 16px;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.2s;
        background-color: #0078D4;
    }
    .pdf-button:hover {
        background-color: #005a9e;
    }

    #clock {
        font-size: 84px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 5px;
    }

    #date {
        font-size: 32px;
        text-align: center;
        margin-bottom: 30px;
    }

    .logo-container {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
    }

    .logo-container img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    @media (max-width: 768px) {
        body { display: block; }
        .container {
            margin: 0;
            border-radius: 0;
            flex-direction: column;
            height: auto;
        }
        .right-panel { display: none; }
        .left-panel {
            width: 100%;
            border-right: none;
            padding: 20px;
            max-height: none;
        }
        #service-list-container {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        h1 { font-size: 36px; }
        .checklist-item label { font-size: 18px; }
    }
</style>
</head>
<body>  
<div class="container">
    <div class="left-panel">
        <h1>Servicelista</h1>
        <div id="service-list-container"></div>
    </div>
    <div class="right-panel">
        <div id="clock"></div>
        <div id="date"></div>
        <div class="logo-container">
            <img src="Dynami_10a╠èr_OK.png" alt="Dynami 10 år Logotyp">
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
function updateTime() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleString('sv-SE', options);
}
setInterval(updateTime, 1000);
updateTime();

const firebaseConfig = {
  apiKey: "AIzaSyDrkXax4XtQdC_kGIVN1OgleLKIunOrIcM",
  authDomain: "erikdynami.firebaseapp.com",
  databaseURL: "https://erikdynami-default-rtdb.firebaseio.com",
  projectId: "erikdynami",
  storageBucket: "erikdynami.firebasestorage.app",
  messagingSenderId: "1014648797947",
  appId: "1:1014648797947:web:323c4dc9bc3ad6ef288e5e"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const tasksRef = database.ref('tasks');
const listContainer = document.getElementById('service-list-container');

tasksRef.on('value', (snapshot) => {
    const tasks = snapshot.val();
    const scrollPosition = listContainer.scrollTop; 
    listContainer.innerHTML = '';

    if (tasks) {
        const prioTasks = [], bypassTasks = [], normalTasks = [];

        Object.keys(tasks).forEach(key => {
            const taskData = tasks[key];
            if (taskData.text) {
                const lowerCaseText = taskData.text.toLowerCase();
                if (lowerCaseText.includes('prio')) {
                    prioTasks.push({ key, data: taskData });
                } else if (lowerCaseText.includes('bypassdiod')) {
                    bypassTasks.push({ key, data: taskData });
                } else {
                    normalTasks.push({ key, data: taskData });
                }
            }
        });

        const renderSection = (title, taskArray) => {
            if (taskArray.length > 0) {
                const heading = document.createElement('h2');
                heading.textContent = title;
                listContainer.appendChild(heading);
                taskArray.forEach(({ key, data }) => createTaskElement(key, data));
            }
        };

        renderSection('PRIO', prioTasks);
        renderSection('SERVICE', normalTasks);
        renderSection('PANELER', bypassTasks);

    } else {
        listContainer.innerHTML = '<p>Inga uppgifter att visa.</p>';
    }
    listContainer.scrollTop = scrollPosition;
});

function createTaskElement(key, taskData) {
    const wrapperDiv = document.createElement('div');
    wrapperDiv.className = 'checklist-item-wrapper';

    const itemDiv = document.createElement('div');
    itemDiv.className = 'checklist-item';
    
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.id = key;
    checkbox.checked = taskData.completed;

    const label = document.createElement('label');
    label.htmlFor = key;
    label.innerHTML = taskData.text.replace(/\\n/g, '<br>');

    checkbox.addEventListener('change', (event) => {
        const isNowChecked = event.target.checked;
        const confirmationMessage = isNowChecked
            ? `Är du säker på att du vill markera "${taskData.text}" som klar?`
            : `Är du säker på att du vill avmarkera "${taskData.text}"?`;

        if (confirm(confirmationMessage)) {
            database.ref('tasks/' + key).update({ completed: isNowChecked });
        } else {
            event.target.checked = !isNowChecked; 
        }
    });

    itemDiv.appendChild(checkbox);
    itemDiv.appendChild(label);
    wrapperDiv.appendChild(itemDiv);

    const timeEntryContainer = document.createElement('div');
    timeEntryContainer.className = 'time-entry-container';
    
    const showSavedIndicator = (element) => {
        element.classList.add('saved-indicator');
        setTimeout(() => {
            element.classList.remove('saved-indicator');
        }, 1500);
    };

    // --- HÄR ÄR ÄNDRINGEN ---
    // Istället för Start/Slut, skapar vi en rad för "Total tid"
    const totalTimeRow = document.createElement('div');
    totalTimeRow.className = 'time-input-row';
    
    const timeLabel = document.createElement('label');
    timeLabel.textContent = 'Total tid:';
    
    const timeInput = document.createElement('input');
    timeInput.type = 'text'; // Textfält så man kan skriva "2h" etc.
    timeInput.placeholder = 'Ange tid...';
    timeInput.value = taskData.total_time || ''; // Hämtar från databasen
    
    // Spara när man klickar utanför fältet (blur)
    timeInput.addEventListener('blur', () => {
        database.ref('tasks/' + key).update({ total_time: timeInput.value })
            .then(() => showSavedIndicator(timeInput));
    });

    totalTimeRow.appendChild(timeLabel);
    totalTimeRow.appendChild(timeInput);
    // -------------------------

    // Rad för knappar
    const buttonRow = document.createElement('div');
    buttonRow.className = 'button-row';

    if (taskData.pdf_url) {
        const pdfButton = document.createElement('button');
        pdfButton.textContent = 'Visa PDF';
        pdfButton.className = 'pdf-button';
        pdfButton.onclick = () => {
            window.open(taskData.pdf_url, '_blank');
        };
        buttonRow.appendChild(pdfButton);
    }
    
    // Lägg till tidsraden istället för start/slut
    timeEntryContainer.appendChild(totalTimeRow);
    
    if(buttonRow.hasChildNodes()){ 
        timeEntryContainer.appendChild(buttonRow);
    }
    wrapperDiv.appendChild(timeEntryContainer);
    listContainer.appendChild(wrapperDiv);
}
</script>
</body>
</html>
